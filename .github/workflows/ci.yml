name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Typecheck
        run: bun x tsc --noEmit

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build

      - name: Unit Tests
        run: bun run test:unit
